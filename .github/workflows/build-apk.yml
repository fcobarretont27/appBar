name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake build-essential libsqlite3-dev libbz2-dev libreadline-dev libgdbm-dev tk-dev liblzma-dev

      - name: Install Cython and buildozer
        run: |
          pip install Cython==0.29.33 buildozer

      - name: Initialize and configure buildozer
        run: |
          buildozer init
          # Aqui você pode editar o buildozer.spec diretamente via sed, se quiser
          # Ou apenas copiar um buildozer.spec já pronto do seu repositório

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-kivy-app
          path: bin/*.apk
